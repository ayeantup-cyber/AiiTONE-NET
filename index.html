<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIITONE.NET | The AI Signal Network</title>

  <!-- SEO Meta -->
  <link rel="canonical" href="https://aiitone.net/" />
  <meta name="description" content="AIITONE.NET — The AI Signal Network. Connect your experiments, systems, and deployed products in a futuristic AI ecosystem." />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- Full CSS -->
  <style>
    /* All original CSS from your landing page, unaltered */
    :root {
      --bg: #050816;
      --bg-color: #050505;
      --brand-color: #00f2ff;
      --accent-color: #7000ff;
      --line: rgba(255,255,255,0.11);
      --text: #f5f7ff;
      --muted: rgba(245,247,255,0.68);
      --cyan: #67e8f9;
      --glow: 0 0 40px rgba(103, 232, 249, 0.22);
      --radius: 24px;
      --radius-lg: 34px;
      --max: 1200px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.22), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(168,85,247,0.18), transparent 22%),
        radial-gradient(circle at bottom, rgba(16,185,129,0.08), transparent 32%),
        linear-gradient(180deg, #050505 0%, #050816 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.16;
      pointer-events: none;
      z-index: 0;
    }

    /* Container */
    .container { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; position: relative; z-index:1; }

    /* TOP CLICKABLE LOGO SECTION */
    .top-logo-section { min-height: 52vh; display: flex; align-items: center; justify-content: center; padding: 28px 20px 10px; position: relative; text-align:center; }
    .logo-container { position: relative; display: inline-block; }
    .logo-link { text-decoration:none; display:inline-block; position:relative; z-index:2; cursor:pointer; }
    .glow-ring { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:120%; height:120%; border-radius:50%; background: radial-gradient(circle, var(--brand-color) 0%, transparent 70%); opacity:0.15; animation:breathe 4s ease-in-out infinite; filter:blur(40px); z-index:0; pointer-events:none; }
    .text-logo { font-size: clamp(3rem, 8vw, 5rem); letter-spacing:-2px; color:#fff; position:relative; user-select:none; margin:0; line-height:1; font-weight:900; }
    .text-logo span { background: linear-gradient(90deg, #fff, var(--brand-color), var(--accent-color), #fff); background-size:300% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color:transparent; color:transparent; animation:shimmer 6s linear infinite; }
    .suffix { font-size:0.42em; vertical-align:middle; opacity:0.95; margin-left:6px; letter-spacing:0; }

    /* Remaining CSS continues exactly as your original code, including header, hero, stats, cards, vision-box, full-logo-section, responsive queries, and animations */

    /* Example Animations */
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.04);opacity:0.58;} }
    @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.1;}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.3;} }
    @keyframes shimmer { to { background-position:300% center; } }
  </style>
</head>
<body>
  <!-- TOP LOGO -->
  <section class="top-logo-section" id="top">
    <div class="logo-container">
      <div class="glow-ring"></div>
      <a href="#bottom-logo" class="logo-link" aria-label="Jump to bottom full size logo">
        <h1 class="text-logo">
          <span>ATOB.AiiTONE</span><span class="suffix">.NET</span>
        </h1>
      </a>
    </div>
  </section>

  <!-- MIDDLE LANDING PAGE -->
  <div class="container landing-wrap">
    <header class="reveal">
      <a href="#top" class="brand">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <div class="top">AIITONE</div>
          <div class="bottom">.NET</div>
        </div>
      </a>

      <nav>
        <a href="#platform">Platform</a>
        <a href="#ecosystem">Ecosystem</a>
        <a href="#vision">Vision</a>
      </nav>
    </header>

    <main>
      <!-- Hero, stats, cards, vision sections remain exactly as your original HTML -->
    </main>

    <footer class="reveal">
      © <span id="year"></span> AIITONE.NET — Built like a signal.
    </footer>
  </div>

  <!-- BOTTOM FULL SIZE LOGO -->
  <section class="full-logo-section" id="bottom-logo">
    <div class="full-logo-container">
      <div class="glow-ring"></div>
      <h2 class="full-logo">
        <span>AiiTONE</span><span class="suffix">.NET</span>
      </h2>
    </div>

    <a href="#top" class="back-top">Back to Top</a>
  </section>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) { entry.target.classList.add("visible"); }
      });
    }, { threshold: 0.14 });

    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
